<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounty Bash | Knowledge Sync</title>
    <style>
        :root {
            --game-green: #2ecc71;
            --game-yellow: #f1c40f;
            --game-red: #e74c3c;
            --bg-dark: #0a0a0a;
            --panel: #161616;
            --input-bg: #222;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-dark); 
            color: #eee; 
            margin: 0; 
            padding-bottom: 120px; 
        }

        nav { 
            background: #000; 
            border-bottom: 2px solid var(--game-green); 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
        }

        nav a { color: white; text-decoration: none; font-weight: bold; margin-left: 20px; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }

        /* Headers matching the game tabs */
        .tab-header {
            background: #222;
            color: var(--game-yellow);
            padding: 12px 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 5px solid var(--game-yellow);
            margin: 30px 0 15px 0;
            display: flex;
            justify-content: space-between;
        }

        .stat-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 10px; 
        }

        .stat-item {
            background: var(--panel);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        label { 
            font-size: 0.85rem; 
            color: #ccc; 
            font-weight: 600;
            flex: 1;
        }

        input {
            background: var(--input-bg);
            border: 1px solid #444;
            color: var(--game-green);
            padding: 8px;
            border-radius: 4px;
            width: 80px;
            text-align: right;
            font-weight: bold;
            font-family: monospace;
        }

        input:focus { border-color: var(--game-yellow); outline: none; }

        /* Sync Footer */
        .footer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            border-top: 3px solid var(--game-green);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-sizing: border-box;
        }

        .summary-stat b { color: var(--game-yellow); font-size: 1.5rem; }
        .summary-stat span { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; }

        .btn-sync {
            background: var(--game-green);
            color: black;
            border: none;
            padding: 15px 40px;
            font-weight: 900;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 900; color: var(--game-green);">KNOWLEDGE SYNC</div>
    <div>
        <a href="index.html">Home</a>
        <a href="hero-editor.html">Hero Editor</a>
        <a href="player-profile.html">Knowledge</a>
    </div>
</nav>

<div class="container">

    <div class="tab-header"><span>ATK</span><span>(Multiplier)</span></div>
    <div class="stat-grid">
        <div class="stat-item"><label>Base Atk</label><input type="number" id="baseAtk" value="0"></div>
        <div class="stat-item"><label>Increase Atk (%)</label><input type="number" id="incAtk" value="0"></div>
        <div class="stat-item"><label>Atk & HP (%)</label><input type="number" id="atkHp" value="0"></div>
        <div class="stat-item"><label>Atk Speed (%)</label><input type="number" id="atkSpd" value="0"></div>
        <div class="stat-item"><label>Atk Amp (%)</label><input type="number" id="atkAmp" value="0"></div>
        <div class="stat-item"><label>Atk (Relic) (%)</label><input type="number" id="relAtk" value="0"></div>
        <div class="stat-item"><label>Atk & HP (Relic) (%)</label><input type="number" id="relAtkHp" value="0"></div>
        <div class="stat-item"><label>Atk (Arena League) (%)</label><input type="number" id="arnAtk" value="0"></div>
        <div class="stat-item"><label>Super Atk (%)</label><input type="number" id="supAtk" value="0"></div>
        <div class="stat-item"><label>Hyper Atk (%)</label><input type="number" id="hypAtk" value="0"></div>
        <div class="stat-item"><label>Ultra Atk (%)</label><input type="number" id="ultAtk" value="0"></div>
        <div class="stat-item"><label>Hero Base Atk (%)</label><input type="number" id="heroBaseAtk" value="0"></div>
    </div>

    <div class="tab-header"><span>HP</span><span>(Survivability)</span></div>
    <div class="stat-grid">
        <div class="stat-item"><label>Base HP</label><input type="number" id="baseHp" value="0"></div>
        <div class="stat-item"><label>Recover HP</label><input type="number" id="recHp" value="0"></div>
        <div class="stat-item"><label>Recover HP Up (%)</label><input type="number" id="recHpP" value="0"></div>
        <div class="stat-item"><label>Increase HP (%)</label><input type="number" id="incHp" value="0"></div>
        <div class="stat-item"><label>Hp Amp (%)</label><input type="number" id="hpAmp" value="0"></div>
        <div class="stat-item"><label>Hp (Relic) (%)</label><input type="number" id="relHp" value="0"></div>
        <div class="stat-item"><label>Hp (Arena League) (%)</label><input type="number" id="arnHp" value="0"></div>
        <div class="stat-item"><label>Super HP (%)</label><input type="number" id="supHp" value="0"></div>
        <div class="stat-item"><label>Hyper HP (%)</label><input type="number" id="hypHp" value="0"></div>
        <div class="stat-item"><label>Ultra HP (%)</label><input type="number" id="ultHp" value="0"></div>
    </div>

    <div class="tab-header"><span>MISC</span><span>(Economy)</span></div>
    <div class="stat-grid">
        <div class="stat-item"><label>Dice Battle Up (%)</label><input type="number" id="diceBattle" value="0"></div>
        <div class="stat-item"><label>Reduce Village Wood Upgrade Cost (%)</label><input type="number" id="redWood" value="0"></div>
        <div class="stat-item"><label>Reduce Village Stone Upgrade Cost (%)</label><input type="number" id="redStone" value="0"></div>
        <div class="stat-item"><label>Reduce Hero LvUp Cost (%)</label><input type="number" id="redHero" value="0"></div>
        <div class="stat-item"><label>Reduce Gear LvUp Cost (%)</label><input type="number" id="redGear" value="0"></div>
        <div class="stat-item"><label>Loot Coin Idle Up (%)</label><input type="number" id="lootCoin" value="0"></div>
        <div class="stat-item"><label>Metal Idle Up (%)</label><input type="number" id="metalIdle" value="0"></div>
        <div class="stat-item"><label>Metal Battle Up (%)</label><input type="number" id="metalBattle" value="0"></div>
        <div class="stat-item"><label>Ore Battle Up (%)</label><input type="number" id="oreBattle" value="0"></div>
        <div class="stat-item"><label>Stone Battle Up (%)</label><input type="number" id="stoneBattle" value="0"></div>
    </div>

</div>

<div class="footer-bar">
    <div class="summary-stat">
        <span>Total ATK Mult</span>
        <b id="atkSum">1.00x</b>
    </div>
    <div class="summary-stat">
        <span>Total HP Mult</span>
        <b id="hpSum">1.00x</b>
    </div>
    <button class="btn-sync" onclick="saveData()">Sync Knowledge</button>
</div>

<script>
    const ids = [
        'baseAtk', 'incAtk', 'atkHp', 'atkSpd', 'atkAmp', 'relAtk', 'relAtkHp', 'arnAtk', 'supAtk', 'hypAtk', 'ultAtk', 'heroBaseAtk',
        'baseHp', 'recHp', 'recHpP', 'incHp', 'hpAmp', 'relHp', 'arnHp', 'supHp', 'hypHp', 'ultHp',
        'diceBattle', 'redWood', 'redStone', 'redHero', 'redGear', 'lootCoin', 'metalIdle', 'metalBattle', 'oreBattle', 'stoneBattle'
    ];

    function calculate() {
        const val = (id) => parseFloat(document.getElementById(id).value) || 0;

        // Sum ATK-related percentages
        const atkPct = val('incAtk') + val('atkHp') + val('atkAmp') + val('relAtk') + val('relAtkHp') + 
                       val('arnAtk') + val('supAtk') + val('hypAtk') + val('ultAtk') + val('heroBaseAtk');

        // Sum HP-related percentages
        const hpPct = val('incHp') + val('atkHp') + val('hpAmp') + val('relHp') + val('relAtkHp') + 
                      val('arnHp') + val('supHp') + val('hypHp') + val('ultHp');

        const atkMult = 1 + (atkPct / 100);
        const hpMult = 1 + (hpPct / 100);

        document.getElementById('atkSum').innerText = atkMult.toFixed(2) + "x";
        document.getElementById('hpSum').innerText = hpMult.toFixed(2) + "x";

        return { atkMult, hpMult };
    }

    function saveData() {
        const results = calculate();
        const data = {};
        ids.forEach(id => { data[id] = document.getElementById(id).value; });
        data.globalAtkMult = results.atkMult;
        data.globalHpMult = results.hpMult;

        localStorage.setItem('bb_knowledge', JSON.stringify(data));
        alert("Knowledge Synced! Data ready for Hero Editor.");
    }

    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('bb_knowledge'));
        if (saved) {
            ids.forEach(id => { if(saved[id]) document.getElementById(id).value = saved[id]; });
        }
        calculate();
        ids.forEach(id => document.getElementById(id).addEventListener('input', calculate));
    };
</script>

</body>
</html>
