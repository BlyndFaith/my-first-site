<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheoryCraft Hub | Player Profile</title>
    <style>
        :root {
            --primary: #0a0a0a;
            --accent: #00ffcc;
            --panel: #1a1a1a;
            --text: #e0e0e0;
        }
        body { font-family: 'Inter', sans-serif; background: var(--primary); color: var(--text); margin: 0; padding-bottom: 50px; }
        nav { background: #000; border-bottom: 2px solid var(--accent); padding: 1rem 2rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; font-size: 0.9rem; }
        
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        
        h2 { color: var(--accent); font-size: 1rem; text-transform: uppercase; margin-top: 0; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; }
        input { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; }
        
        .summary-box { background: #000; padding: 20px; border-radius: 8px; border: 1px solid var(--accent); text-align: center; }
        .stat-total { font-size: 2rem; font-weight: 800; color: var(--accent); }
        
        .btn-save { background: var(--accent); color: black; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-save:hover { background: white; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 900;">BASH PROFILE</div>
    <div>
        <a href="index.html">Dashboard</a>
        <a href="hero-editor.html">Editor</a>
        <a href="player-profile.html">Profile</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>Global Modifiers</h2>
        <p style="font-size: 0.8rem; color: #666;">These bonuses apply to EVERY hero on your team.</p>
        
        <div class="grid">
            <div class="field">
                <label>Knowledge Points (ATK %)</label>
                <input type="number" id="knowledgeAtk" value="0" oninput="updateProfile()">
            </div>
            <div class="field">
                <label>Knowledge Points (HP %)</label>
                <input type="number" id="knowledgeHp" value="0" oninput="updateProfile()">
            </div>
        </div>

        <div class="grid">
            <div class="field">
                <label>Artifact Multiplier (Total)</label>
                <input type="number" id="artifactMult" value="0" placeholder="e.g. 15.5" oninput="updateProfile()">
            </div>
            <div class="field">
                <label>Gem Bonus (%)</label>
                <input type="number" id="gemBonus" value="0" oninput="updateProfile()">
            </div>
        </div>
    </div>

    <div class="card summary-box">
        <label>TOTAL ACCOUNT ATK MULTIPLIER</label>
        <div class="stat-total" id="totalAtkMod">1.00x</div>
        <p style="font-size: 0.7rem; color: #555; margin-top: 10px;">
            (Base + Knowledge + Artifacts + Gems)
        </p>
    </div>

    <button class="btn-save" onclick="saveProfile()">Apply to All Heroes</button>
</div>

<script>
    function updateProfile() {
        const kAtk = parseFloat(document.getElementById('knowledgeAtk').value) || 0;
        const art = parseFloat(document.getElementById('artifactMult').value) || 0;
        const gem = parseFloat(document.getElementById('gemBonus').value) || 0;

        // Formula: 1 (base) + percentages converted to decimals
        const totalMod = 1 + (kAtk / 100) + (art / 100) + (gem / 100);
        
        document.getElementById('totalAtkMod').innerText = totalMod.toFixed(2) + "x";
    }

    function saveProfile() {
        const profileData = {
            kAtk: document.getElementById('knowledgeAtk').value,
            kHp: document.getElementById('knowledgeHp').value,
            art: document.getElementById('artifactMult').value,
            gem: document.getElementById('gemBonus').value,
            totalMod: document.getElementById('totalAtkMod').innerText.replace('x', '')
        };

        localStorage.setItem('bountyProfile', JSON.stringify(profileData));
        alert("Account modifiers saved! Your Hero Editor will now use these values.");
    }

    // Load existing data if it exists
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('bountyProfile'));
        if (saved) {
            document.getElementById('knowledgeAtk').value = saved.kAtk;
            document.getElementById('knowledgeHp').value = saved.kHp;
            document.getElementById('artifactMult').value = saved.art;
            document.getElementById('gemBonus').value = saved.gem;
            updateProfile();
        }
    }
</script>

</body>
</html>
