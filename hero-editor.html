<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheoryCraft Hub | Advanced Editor</title>
    <style>
        :root {
            --dark-bg: #0d0d0d;
            --panel-bg: #1a1a1a;
            --accent: #00ffcc; /* Cyberpunk Teal */
            --text-main: #e0e0e0;
            --border: #333;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            line-height: 1.4;
        }

        /* Navigation */
        nav {
            background: #000;
            border-bottom: 2px solid var(--accent);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a { color: var(--text-main); text-decoration: none; margin-left: 20px; font-weight: bold; }
        nav a:hover { color: var(--accent); }

        .editor-layout {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 80px);
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
        }

        h2 { color: var(--accent); font-size: 1.1rem; text-transform: uppercase; margin-top: 0; }

        .input-row { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 4px; }
        
        select, input {
            width: 100%;
            background: #222;
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 4px;
            outline: none;
        }

        select:focus, input:focus { border-color: var(--accent); }

        /* Stat Grid */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Preview Card */
        .hero-preview {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid var(--accent);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        .star-rating { color: #f1c40f; font-size: 1.5rem; margin-bottom: 10px; }
        .hero-name { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
        .stat-display { font-size: 3rem; color: var(--accent); font-weight: 800; }

        .btn-save {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 4px;
        }

        .btn-save:hover { background: white; }

        .dice-section {
            background: #252525;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 1.4rem; color: var(--accent);">Bounty TheoryCraft</div>
    <div>
        <a href="index.html">Home</a>
        <a href="hero-editor.html">Editor</a>
        <a href="test-teams.html">My Teams</a>
    </div>
</nav>

<div class="editor-layout">
    <div class="panel">
        <h2>Configuration</h2>
        
        <div class="input-row">
            <label>Hero Template</label>
            <select id="heroKey" onchange="loadBaseStats()">
                <option value="Whisker" data-atk="1000" data-hp="3000">Whisker</option>
                <option value="Seabeard" data-atk="900" data-hp="2500">Seabeard</option>
                <option value="MechaMog" data-atk="1200" data-hp="3500">Mecha Mog</option>
                <option value="Pawsitive" data-atk="800" data-hp="2000">Pawsitive</option>
            </select>
        </div>

        <div class="stat-grid">
            <div class="input-row">
                <label>Level</label>
                <input type="number" id="lvl" value="1" min="1" oninput="updateUI()">
            </div>
            <div class="input-row">
                <label>Stars</label>
                <input type="number" id="stars" value="1" min="1" max="6" oninput="updateUI()">
            </div>
        </div>

        <div class="input-row">
            <label>Owned Effect (Crit %)</label>
            <input type="number" id="owned" value="0" oninput="updateUI()">
        </div>

        <div class="dice-section">
            <label>🎲 Custom Dice Multiplier</label>
            <input type="range" id="dice" min="1" max="20" value="1" oninput="updateUI()">
            <div id="diceVal" style="text-align:center; font-size: 0.8rem;">Roll: 1x</div>
        </div>

        <button class="btn-save" onclick="saveHero()">Save to Team</button>
    </div>

    <div class="panel hero-preview">
        <div class="star-rating" id="starDisplay">★</div>
        <div class="hero-name" id="nameDisplay">Whisker</div>
        <div style="color: #888;">LVL <span id="lvlDisplay">1</span></div>
        
        <div style="margin: 40px 0;">
            <div style="text-transform:uppercase; letter-spacing: 2px; font-size: 0.8rem;">Combat Power</div>
            <div class="stat-display" id="powerDisplay">0</div>
        </div>

        <div class="stat-grid">
            <div style="border: 1px solid #333; padding: 10px;">
                <label>HP</label>
                <div id="hpDisplay">0</div>
            </div>
            <div style="border: 1px solid #333; padding: 10px;">
                <label>UPGRADE COST</label>
                <div id="costDisplay">0 💰</div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>Active Team</h2>
        <div id="teamList" style="font-size: 0.8rem;">
            <p style="color: #555;">No heroes saved yet.</p>
        </div>
        <button onclick="clearTeam()" style="background: none; border: 1px solid #444; color: #888; width: 100%; margin-top: 20px; cursor: pointer;">Clear Team</button>
    </div>
</div>

<script>
    // These values match the scaling found in your game config files
    const LEVEL_AMP = 0.006; 
    const STAR_MULT = 1.15;

    function updateUI() {
        const select = document.getElementById('heroKey');
        const option = select.options[select.selectedIndex];
        
        const baseAtk = parseFloat(option.getAttribute('data-atk'));
        const baseHp = parseFloat(option.getAttribute('data-hp'));
        const lvl = parseInt(document.getElementById('lvl').value);
        const stars = parseInt(document.getElementById('stars').value);
        const owned = parseFloat(document.getElementById('owned').value) || 0;
        const dice = parseInt(document.getElementById('dice').value);

        // Logic: Calculate growth
        const lvlBonus = 1 + (LEVEL_AMP * (lvl - 1));
        const starBonus = Math.pow(STAR_MULT, stars - 1);
        const ownedBonus = 1 + (owned / 100);
        
        const totalPower = (baseAtk * lvlBonus * starBonus * ownedBonus) * dice;
        const totalHp = baseHp * lvlBonus * starBonus;
        
        // Logic: Calculate gold cost (simplified exponential curve)
        const cost = Math.floor(Math.pow(lvl, 1.5) * 100);

        // Update Visuals
        document.getElementById('nameDisplay').innerText = select.value;
        document.getElementById('lvlDisplay').innerText = lvl;
        document.getElementById('starDisplay').innerText = "★".repeat(stars);
        document.getElementById('powerDisplay').innerText = Math.floor(totalPower).toLocaleString();
        document.getElementById('hpDisplay').innerText = Math.floor(totalHp).toLocaleString();
        document.getElementById('costDisplay').innerText = cost.toLocaleString() + " 💰";
        document.getElementById('diceVal').innerText = "Roll: " + dice + "x";
    }

    function saveHero() {
        const hero = {
            name: document.getElementById('heroKey').value,
            power: document.getElementById('powerDisplay').innerText,
            lvl: document.getElementById('lvl').value
        };

        // Get existing team or start new one
        let team = JSON.parse(localStorage.getItem('myTeam')) || [];
        team.push(hero);
        localStorage.setItem('myTeam', JSON.stringify(team));
        
        renderTeam();
    }

    function renderTeam() {
        const team = JSON.parse(localStorage.getItem('myTeam')) || [];
        const container = document.getElementById('teamList');
        
        if (team.length === 0) {
            container.innerHTML = '<p style="color: #555;">No heroes saved yet.</p>';
            return;
        }

        container.innerHTML = team.map(h => `
            <div style="border-bottom: 1px solid #333; padding: 8px 0;">
                <span style="color:var(--accent)">${h.name}</span> (LVL ${h.lvl})<br>
                <span style="font-size: 0.7rem; color: #888;">Power: ${h.power}</span>
            </div>
        `).join('');
    }

    function clearTeam() {
        localStorage.removeItem('myTeam');
        renderTeam();
    }

    // Initialize
    updateUI();
    renderTeam();
</script>

</body>
</html>
