<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounty Bash | Official Formula Editor</title>
    <style>
        :root {
            --melon: #2ecc71;
            --dice: #9b59b6;
            --panel: #1a1a1a;
            --ss-rank: #f1c40f;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; }
        .layout { display: grid; grid-template-columns: 400px 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .box { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 10px; }
        h2 { color: var(--melon); font-size: 0.9rem; text-transform: uppercase; margin-top: 0; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        input, select { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; }
        .stat-val { font-size: 2.5rem; font-weight: 800; color: var(--ss-rank); text-align: center; margin: 10px 0; }
        .cost-tag { color: var(--melon); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="layout">
    <div class="box">
        <h2>Configuration</h2>
        <div class="field">
            <label>Hero Base (From Persos.xml)</label>
            <select id="heroSelect" onchange="calc()">
                <option value="1000" data-hp="3000">Whisker (Base 1000)</option>
                <option value="1400" data-hp="2500">DragonDA (Base 1400)</option>
                <option value="1250" data-hp="3000">NecroDA (Base 1250)</option>
                <option value="100" data-hp="1000">Polly (Base 100)</option>
            </select>
        </div>
        <div class="field">
            <label>Level</label>
            <input type="number" id="lvl" value="1" min="1" oninput="calc()">
        </div>
        <div class="field">
            <label>Star Level (20% Multiplier)</label>
            <input type="number" id="stars" value="1" min="1" max="10" oninput="calc()">
        </div>
        <div class="field">
            <label>Dice Rank Effect</label>
            <select id="dice" onchange="calc()">
                <option value="1">None</option>
                <option value="1.25">Rank A (+25% Stats)</option>
                <option value="1.50">Rank S (+50% Stats)</option>
                <option value="2.00">Rank SS (+100% Stats)</option>
            </select>
        </div>
    </div>

    <div class="box">
        <h2>Live Calculations</h2>
        <div id="heroName" style="font-size: 1.5rem; font-weight: bold;">Whisker</div>
        
        <div style="margin-top: 20px;">
            <label>Calculated Combat Power</label>
            <div class="stat-val" id="power">0</div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Estimated HP</label>
                <div id="hp" style="font-weight: bold;">0</div>
            </div>
            <div>
                <label>Melon Upgrade Cost</label>
                <div class="cost-tag" id="cost">0 🍉</div>
            </div>
        </div>
        
        <div style="margin-top: 20px; font-size: 0.8rem; color: #666; border-top: 1px solid #333; padding-top: 10px;">
            Formula: Base * (1 + (0.006 * Lvl)) * (1.2 ^ Stars) * Dice
        </div>
    </div>
</div>

<script>
    function calc() {
        const select = document.getElementById('heroSelect');
        const baseAtk = parseFloat(select.value);
        const baseHp = parseFloat(select.options[select.selectedIndex].getAttribute('data-hp'));
        
        const lvl = parseInt(document.getElementById('lvl').value);
        const stars = parseInt(document.getElementById('stars').value);
        const dice = parseFloat(document.getElementById('dice').value);

        // --- ACTUAL GAME FORMULAS ---
        const lvlBonus = 1 + (0.006 * (lvl - 1));
        const starBonus = Math.pow(1.2, stars - 1);
        
        const finalAtk = (baseAtk * lvlBonus * starBonus) * dice;
        const finalHp = (baseHp * lvlBonus * starBonus) * dice;

        // --- MELON COST (1.2 exponential growth) ---
        const melonBase = 100; // Starting cost for level 1
        const finalCost = Math.floor(melonBase * Math.pow(1.2, lvl - 1));

        document.getElementById('heroName').innerText = select.options[select.selectedIndex].text.split('(')[0];
        document.getElementById('power').innerText = Math.floor(finalAtk).toLocaleString();
        document.getElementById('hp').innerText = Math.floor(finalHp).toLocaleString();
        document.getElementById('cost').innerText = finalCost.toLocaleString() + " 🍉";
    }
    calc();
</script>

</body>
</html>
