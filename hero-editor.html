<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounty Bash | Hero Editor V3</title>
    <style>
        :root { --melon: #2ecc71; --accent: #f1c40f; --panel: #161616; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; margin: 0; padding-bottom: 50px; }
        nav { background: #000; border-bottom: 2px solid var(--melon); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; font-weight: bold; margin-left: 20px; font-size: 0.9rem; }
        
        .layout { display: grid; grid-template-columns: 380px 1fr; gap: 20px; max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .box { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 12px; }
        
        h2 { font-size: 0.8rem; text-transform: uppercase; color: var(--melon); letter-spacing: 2px; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: #777; margin-bottom: 5px; }
        select, input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; box-sizing: border-box; }

        .big-stat { font-size: 2.8rem; font-weight: 900; color: var(--accent); text-align: center; margin: 15px 0; }
        .profile-notice { background: #000; border-left: 4px solid var(--accent); padding: 10px; font-size: 0.8rem; color: #aaa; margin-bottom: 20px; }
        .star-row { color: var(--accent); font-size: 1.2rem; text-align: center; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 900; color: var(--melon);">BOUNTY BASH HELPER</div>
    <div>
        <a href="index.html">Home</a>
        <a href="hero-editor.html">Hero Editor</a>
        <a href="player-profile.html">My Profile</a>
    </div>
</nav>

<div class="layout">
    <div class="box">
        <h2>Hero Selection</h2>
        <div class="profile-notice">
            ⚠️ Profile ATK Multiplier: <b id="activeMod">1.00x</b>
        </div>

        <div class="field">
            <label>Template (From Persos.xml)</label>
            <select id="heroSelect" onchange="runCalculation()">
                <option value="1000" data-hp="3000">Whisker</option>
                <option value="900" data-hp="2500">Seabeard</option>
                <option value="1400" data-hp="2800">DragonDA</option>
                <option value="1250" data-hp="3500">NecroDA</option>
                <option value="100" data-hp="1000">Polly</option>
            </select>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="field">
                <label>Level</label>
                <input type="number" id="lvl" value="1" min="1" oninput="runCalculation()">
            </div>
            <div class="field">
                <label>Stars (1.2x each)</label>
                <input type="number" id="stars" value="1" min="1" max="10" oninput="runCalculation()">
            </div>
        </div>

        <h2>🎲 Dice Effects</h2>
        <div class="field">
            <label>Dice Roll Rank</label>
            <select id="dice" onchange="runCalculation()">
                <option value="1">No Effect</option>
                <option value="1.25">Rank A (+25%)</option>
                <option value="1.50">Rank S (+50%)</option>
                <option value="2.00">Rank SS (+100%)</option>
            </select>
        </div>
    </div>

    <div class="box" style="text-align: center;">
        <div class="star-row" id="starVis">★</div>
        <h1 id="heroName" style="margin: 5px 0;">Hero</h1>
        
        <div style="margin: 30px 0;">
            <label>TOTAL CALCULATED ATTACK</label>
            <div class="big-stat" id="resAtk">0</div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="background: #000; padding: 15px; border-radius: 8px;">
                <label>Total HP</label>
                <div id="resHp" style="font-size: 1.5rem; font-weight: bold; color: #e74c3c;">0</div>
            </div>
            <div style="background: #000; padding: 15px; border-radius: 8px;">
                <label>Upgrade Cost</label>
                <div id="resCost" style="font-size: 1.5rem; font-weight: bold; color: var(--melon);">0 🍉</div>
            </div>
        </div>
        
        <p style="font-size: 0.75rem; color: #555; margin-top: 30px; text-align: left; line-height: 1.5;">
            <b>FORMULA:</b> (BaseAtk * LvlScaling * StarPower * DiceRoll) * ProfileMultiplier<br>
            <i>Note: LvlScaling uses the 0.006 (0.6%) amp found in Config.xml</i>
        </p>
    </div>
</div>

<script>
    let globalAtkMult = 1.00;

    function loadProfile() {
        const saved = JSON.parse(localStorage.getItem('bountyBashProfile'));
        if (saved) {
            globalAtkMult = parseFloat(saved.atkMult);
            document.getElementById('activeMod').innerText = globalAtkMult.toFixed(2) + "x";
        }
        runCalculation();
    }

    function runCalculation() {
        const select = document.getElementById('heroSelect');
        const baseAtk = parseFloat(select.value);
        const baseHp = parseFloat(select.options[select.selectedIndex].getAttribute('data-hp'));
        
        const lvl = parseInt(document.getElementById('lvl').value);
        const stars = parseInt(document.getElementById('stars').value);
        const dice = parseFloat(document.getElementById('dice').value);

        // --- GAME FORMULAS ---
        const lvlScaling = 1 + (0.006 * (lvl - 1));
        const starPower = Math.pow(1.2, stars - 1); // 1.2 multiplier from Config.xml
        
        // Final math including the Profile Multiplier
        const finalAtk = (baseAtk * lvlScaling * starPower * dice) * globalAtkMult;
        const finalHp = (baseHp * lvlScaling * starPower * dice);

        // Melon Cost (1.2 growth)
        const finalCost = Math.floor(100 * Math.pow(1.2, lvl - 1));

        // Update UI
        document.getElementById('heroName').innerText = select.options[select.selectedIndex].text;
        document.getElementById('starVis').innerText = "★".repeat(stars);
        document.getElementById('resAtk').innerText = Math.floor(finalAtk).toLocaleString();
        document.getElementById('resHp').innerText = Math.floor(finalHp).toLocaleString();
        document.getElementById('resCost').innerText = finalCost.toLocaleString() + " 🍉";
    }

    window.onload = loadProfile;
</script>

</body>
</html>
